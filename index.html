<!DOCTYPE html>
<html>
<head>
    <title>PoopyPloppy - THE MEGA UPDATE</title>
    <style>
        body { 
            background: #2c3e50; color: #f1c40f; text-align: center; 
            font-family: 'Comic Sans MS', cursive; 
            margin: 0; padding: 0; transition: background 0.5s; overflow-x: hidden;
        }
        #ui-bar { 
            position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.9); 
            padding: 10px 0; border-bottom: 3px solid #f1c40f; z-index: 1000;
        }
        .room { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 10px solid #1a252f; position: relative; }
        #main-room { background: #34495e; padding-top: 150px; }
        #shop-room { background: #2ecc71; color: white; }
        #friend-room { background: #795548; color: white; }
        
        canvas { background: #ecf0f1; border: 10px solid #7f8c8d; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.7); cursor: crosshair; }
        
        /* Event Visuals */
        .disco { animation: discoBG 0.2s infinite !important; }
        @keyframes discoBG { 0% { background: #ff0000; } 33% { background: #00ff00; } 66% { background: #0000ff; } }
        
        .leaderboard { position: absolute; left: 20px; top: 160px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; text-align: left; border: 1px solid gold; font-size: 14px; z-index: 10; }
        .boss-ui { display: none; color: #e74c3c; font-size: 30px; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px #000; }
        
        .shop-card { background: rgba(0,0,0,0.3); border: 3px solid white; padding: 20px; margin: 10px; width: 220px; border-radius: 15px; display: inline-block; vertical-align: top; }
        
        /* Friend Animation */
        .friend-display { font-size: 80px; position: relative; height: 250px; width: 200px; }
        .plop-animation { position: absolute; left: 40%; animation: dropPoop 1s infinite; display: none; }
        @keyframes dropPoop { 0% { top: 50px; opacity: 1; } 100% { top: 180px; opacity: 0; } }

        #dev-section { background: #000; color: #0f0; padding: 40px; font-family: monospace; border-top: 5px solid #0f0; }
        .dev-controls { display: none; }
        .dev-btn { background: #0f0; color: #000; border: none; padding: 10px; margin: 5px; cursor: pointer; font-weight: bold; }

        button { font-family: 'Comic Sans MS', cursive; padding: 10px 20px; cursor: pointer; background: #e67e22; color: white; border: 2px solid white; border-radius: 10px; font-weight: bold; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body id="gameBody">

    <div id="ui-bar">
        <div style="font-size: 18px;">
            💩 PoopyPloppy MEGA | High Score: <span id="bestScore">0</span>
            <br>
            🪙 <span id="coins">0</span> | LVL: <span id="lvl">1</span> | STREAK: <span id="streak">0</span>
        </div>
        <button id="music-btn" onclick="toggleMusic()">🎵 Music: OFF</button>
        <button onclick="toggleExtreme()">EXTREME MODE</button>
    </div>

    <div class="leaderboard">
        <h4 style="margin:0; color:gold;">🏆 RANKINGS</h4>
        <div id="leaderList"></div>
    </div>

    <div id="main-room" class="room">
        <div id="boss-info" class="boss-ui">🐲 MOM DRAGON HP: <span id="bossHP">5</span> 🐲</div>
        <h1 id="mode-text">NORMAL MODE</h1>
        <canvas id="gameCanvas" width="600" height="450"></canvas>
        <p>Next Event in: <span id="event-timer">--:--</span></p>
    </div>

    <div id="shop-room" class="room">
        <h1>🛒 THE SHOP</h1>
        <div class="shop-card"><h3>BIGGER DROPS</h3><button onclick="buyUpgrade()">Upgrade (<span id="sizeCost">10</span> 🪙)</button></div>
        <div class="shop-card"><h3>HIRE PAL</h3><button id="buyFriend" onclick="buyFriend()">Hire (50 🪙)</button></div>
        <div class="shop-card" id="speed-card" style="display:none;"><h3>PAL SPEED</h3><button onclick="upgradeFriendSpeed()">Upgrade (<span id="speedCost">100</span> 🪙)</button></div>
    </div>

    <div id="friend-room" class="room">
        <h1>🏚️ THE BASEMENT</h1>
        <div id="friend-area" style="opacity: 0.3;">
            <p id="friend-status">VACANT</p>
            <div class="friend-display">
                <span id="friend-emoji">👤</span><br>
                <span id="friend-poop" class="plop-animation">💩</span>
                <span>🚽</span>
            </div>
            <h2 id="friend-income">+0 COINS / SEC</h2>
        </div>
    </div>

    <div id="dev-section">
        <h2>🛠️ ADMIN CONSOLE (admin123)</h2>
        <div id="dev-lock">
            <input type="password" id="devPass"> <button onclick="unlockDev()">Login</button>
        </div>
        <div id="dev-controls" class="dev-controls">
            <button class="dev-btn" onclick="addCoins(5000)">+5,000 Coins</button>
            <button class="dev-btn" onclick="startBoss()">Spawn Boss</button>
            <button class="dev-btn" onclick="startAbuse('disco')">Disco Party</button>
            <button class="dev-btn" onclick="startAbuse('lowGrav')">Low Gravity</button>
            <button class="dev-btn" onclick="startAbuse('tiny')">Tiny Poop</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const body = document.getElementById('gameBody');
const bgMusic = document.getElementById('bgMusic');

let coins = 0, level = 1, streak = 0, gameState = "aiming";
let babyX = 50, babyDir = 1, babySpeed = 3;
let plopY = 80, plopX = 0, fallSpeed = 0, gravity = 0.4;
let poopSize = 30, upgradeCost = 10;
let toiletX = 250, toiletDir = 1, toiletSpeed = 2;

let dragonX = 300, dragonDir = 1, dragonSpeed = 4;
let extremeMode = false, isBossFight = false, bossHP = 5;
let isMusicOn = false, isGolden = false;
let highscore = localStorage.getItem('poopyHighScore') || 0;

let hasFriend = false, friendInterval = null, friendCooldown = 3000, friendSpeedCost = 100;

document.getElementById('bestScore').innerText = highscore;
updateLeaderboard();

function updateLeaderboard() {
    let list = `1. Kacen - ${highscore}<br>2. Roman - ${Math.floor(highscore * 0.8)}<br>3. Guest - 0`;
    document.getElementById('leaderList').innerHTML = list;
}

function toggleMusic() {
    if (isMusicOn) { bgMusic.pause(); document.getElementById('music-btn').innerText = "🎵 Music: OFF"; }
    else { bgMusic.play(); document.getElementById('music-btn').innerText = "🎵 Music: ON"; }
    isMusicOn = !isMusicOn;
}

function toggleExtreme() {
    extremeMode = !extremeMode;
    document.getElementById('mode-text').innerText = extremeMode ? "🔥 EXTREME MODE 🔥" : "NORMAL MODE";
    document.getElementById('main-room').style.background = extremeMode ? "#c0392b" : "#34495e";
}

// --- EVENTS & BOSS ---
function checkClock() {
    let now = new Date();
    let mins = now.getMinutes(); let secs = now.getSeconds();
    document.getElementById('event-timer').innerText = `${9 - (mins % 10)}m ${59 - secs}s`;
    if (mins === 0 && secs === 0 && !isBossFight) startBoss();
    if (mins % 10 === 0 && secs === 0) {
        const types = ['disco', 'lowGrav', 'tiny'];
        startAbuse(types[Math.floor(Math.random() * types.length)]);
    }
}
setInterval(checkClock, 1000);

function startBoss() {
    isBossFight = true; bossHP = extremeMode ? 10 : 5;
    document.getElementById('boss-info').style.display = "block";
    document.getElementById('bossHP').innerText = bossHP;
    body.style.background = "#1a0633";
    document.getElementById('mode-text').innerText = "🐲 BOSS: MOM DRAGON 🐲";
}

function winBoss() {
    isBossFight = false; coins += 1000;
    document.getElementById('boss-info').style.display = "none";
    body.style.background = extremeMode ? "#c0392b" : "#34495e";
    updateUI();
}

function startAbuse(type) {
    if(type === 'disco') body.classList.add('disco');
    if(type === 'lowGrav') { gravity = 0.1; babySpeed = 8; }
    if(type === 'tiny') { poopSize = 5; }
    setTimeout(() => {
        body.classList.remove('disco'); gravity = 0.4; babySpeed = 3; poopSize = 30;
    }, 15000);
}

// --- SHOP & FRIENDS ---
function buyUpgrade() { if(coins >= upgradeCost) { coins -= upgradeCost; poopSize += 8; upgradeCost *= 2; updateUI(); } }

function buyFriend() {
    if(coins >= 50) {
        coins -= 50; hasFriend = true;
        document.getElementById('buyFriend').disabled = true;
        document.getElementById('speed-card').style.display = "inline-block";
        document.getElementById('friend-area').style.opacity = "1";
        document.getElementById('friend-emoji').innerText = "👦";
        document.getElementById('friend-poop').style.display = "block";
        document.getElementById('friend-status').innerText = "PAL POOPIN'";
        startFriendTimer(); updateUI();
    }
}

function startFriendTimer() {
    if(friendInterval) clearInterval(friendInterval);
    document.getElementById('friend-income').innerText = `+${(1000/friendCooldown).toFixed(1)}/sec`;
    document.getElementById('friend-poop').style.animationDuration = (friendCooldown/1000) + "s";
    friendInterval = setInterval(() => { coins++; updateUI(); }, friendCooldown);
}

function upgradeFriendSpeed() {
    if(coins >= friendSpeedCost) {
        coins -= friendSpeedCost; friendCooldown = Math.max(200, friendCooldown - 400);
        friendSpeedCost *= 2; document.getElementById('speedCost').innerText = friendSpeedCost;
        startFriendTimer(); updateUI();
    }
}

// --- GAME ENGINE ---
function resetRound() {
    gameState = "aiming"; plopY = 80; fallSpeed = 0;
    babySpeed = 3 + (level * 0.1);
    isGolden = (Math.random() < 0.1); // 10% chance
}

function update() {
    if (gameState === "aiming") {
        babyX += babyDir * babySpeed;
        if (babyX > canvas.width - 50 || babyX < 50) babyDir *= -1;
    }
    if (isBossFight) {
        dragonX += dragonDir * dragonSpeed;
        if (dragonX > canvas.width - 100 || dragonX < 100) dragonDir *= -1;
    }
    if (extremeMode && !isBossFight) {
        toiletX += toiletDir * toiletSpeed;
        if (toiletX > canvas.width - 90 || toiletX < 10) toiletDir *= -1;
    }

    if (gameState === "falling") {
        fallSpeed += gravity; plopY += fallSpeed;
        if (plopY > canvas.height - 20) { streak = 0; resetRound(); }
        
        if (isBossFight) {
            if (plopY > 200 && plopY < 300 && Math.abs(plopX - dragonX) < 60) {
                bossHP--; document.getElementById('bossHP').innerText = bossHP;
                resetRound(); if(bossHP <= 0) winBoss();
            }
        } else {
            if (plopY >= 380 && plopX > toiletX && plopX < toiletX + 80) {
                coins += (1 + streak) * (isGolden ? 5 : 1) * (extremeMode ? 2 : 1);
                level++; streak++;
                if(level > highscore) { highscore = level; localStorage.setItem('poopyHighScore', highscore); }
                resetRound(); updateUI(); updateLeaderboard();
            }
        }
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#795548"; ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
    if(isBossFight) {
        ctx.font = "120px Arial"; ctx.fillText(dragonDir > 0 ? "🐲" : "🐉", dragonX - 60, 280);
    } else {
        ctx.font = "80px Arial"; ctx.fillText("🚽", toiletX, 420);
    }
    ctx.font = "50px Arial"; ctx.fillText("👶", babyX - 25, 70);
    if (gameState === "falling") {
        ctx.font = `${poopSize}px Arial`;
        ctx.fillText(isGolden ? "✨" : "💩", plopX - 15, plopY);
    }
}

canvas.addEventListener('mousedown', () => {
    if (gameState === "aiming") {
        gameState = "falling"; plopX = babyX;
        if(isMusicOn) bgMusic.play().catch(()=>{});
    }
});

function unlockDev() { if(document.getElementById('devPass').value === "admin123") { document.getElementById('dev-lock').style.display = "none"; document.getElementById('dev-controls').style.display = "block"; } }
function addCoins(n) { coins += n; updateUI(); }
function updateUI() {
    document.getElementById('coins').innerText = Math.floor(coins);
    document.getElementById('lvl').innerText = level;
    document.getElementById('streak').innerText = streak;
    document.getElementById('sizeCost').innerText = upgradeCost;
    document.getElementById('bestScore').innerText = highscore;
}

updateUI(); update();
</script>
</body>
</html>
