<!DOCTYPE html>
<html>
<head>
    <title>PoopyPloppy - Kacen & Roman</title>
    <style>
        body { 
            background: #2c3e50; 
            color: #f1c40f; 
            text-align: center; 
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; 
            margin: 0;
            padding: 0;
            transition: background 0.5s;
        }
        #ui-bar { 
            position: fixed; 
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); 
            padding: 10px 0; 
            border-bottom: 3px solid #f1c40f;
            z-index: 1000;
        }
        .room {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 10px solid #1a252f;
            position: relative;
        }
        #main-room { background: #34495e; padding-top: 100px; }
        #shop-room { background: #2ecc71; color: #fff; }
        #friend-room { background: #795548; color: #fff; }

        canvas { 
            background: #ecf0f1; 
            border: 10px solid #7f8c8d; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        /* Extreme Mode Styling */
        .extreme-active { background: #c0392b !important; animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        .shop-card {
            background: rgba(0,0,0,0.3);
            border: 3px solid white;
            padding: 20px;
            margin: 10px;
            width: 250px;
            border-radius: 15px;
            display: inline-block;
        }
        button { 
            font-family: 'Comic Sans MS', cursive; 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #e67e22; 
            color: white; 
            border: 2px solid white; 
            border-radius: 10px;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #95a5a6; opacity: 0.5; }

        .friend-display { font-size: 100px; position: relative; height: 280px; width: 100%; overflow: hidden; }
        .plop-animation { position: absolute; left: 50%; animation: dropPoop 1s infinite; display: none; }
        @keyframes dropPoop {
            0% { top: 80px; opacity: 1; transform: translateX(-50%) scale(0.5); }
            100% { top: 220px; opacity: 0; transform: translateX(-50%) scale(1.2); }
        }
        
        #extreme-toggle { background: #e74c3c; font-size: 20px; margin-top: 10px; }
        .warning { color: #ff6347; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

 <div id="ui-bar">
        <div style="font-size: 24px;">
            <p>PoopyPloppy - by Kacen and Roman - Plop with your friends!</p>
            🪙 <span id="coins">0</span> | LVL: <span id="lvl">1</span> | STREAK: <span id="streak">0</span>
        </div>
        <button id="extreme-toggle" onclick="toggleExtreme()">ENABLE EXTREME MODE (2x COINS)</button>
    </div>

    <div id="main-room" class="room">
        <h1 id="mode-text">NORMAL MODE</h1>
        <canvas id="gameCanvas" width="500" height="450"></canvas>
        <div style="font-size: 30px;">↓ SHOP & BASEMENT ↓</div>
    </div>

    <div id="shop-room" class="room">
        <h1>THE SHOP</h1>
        <div class="shop-card">
            <h3>BIGGER DROPS</h3>
            <button id="buySize" onclick="buyUpgrade()">Bigger 💩 (<span id="sizeCost">10</span> 🪙)</button>
        </div>
        <div class="shop-card">
            <h3>HIRE HELP</h3>
            <button id="buyFriend" onclick="buyFriend()">Hire Pal (50 🪙)</button>
        </div>
        <div class="shop-card" id="speed-card" style="display:none;">
            <h3>FAST DIGESTION</h3>
            <button id="buySpeed" onclick="upgradeFriendSpeed()">Faster Pal (<span id="speedCost">100</span> 🪙)</button>
        </div>
    </div>

    <div id="friend-room" class="room">
        <h1>THE BASEMENT BATHROOM</h1>
        <div id="friend-area" style="opacity: 0.3;">
            <p id="friend-status">VACANT</p>
            <div class="friend-display">
                <span id="friend-emoji" style="position: absolute; left: 50%; transform: translateX(-50%);">👤</span>
                <span id="friend-poop" class="plop-animation">💩</span>
            </div>
            <h2 id="friend-income">+0 COINS / SEC</h2>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let coins = 0, level = 1, streak = 0;
let gameState = "aiming";
let babyX = 50, babyDir = 1, babySpeed = 2.5;
let plopY = 80, plopX = 0, fallSpeed = 0, gravity = 0.4;
let poopSize = 30, upgradeCost = 10;

// Extreme Mode Variables
let extremeMode = false;
let toiletX = 210, toiletDir = 1, toiletSpeed = 2;

// Friend Logic
let hasFriend = false, friendInterval = null, friendCooldown = 3000;
let friendCost = 50, friendSpeedCost = 100;

function toggleExtreme() {
    extremeMode = !extremeMode;
    const btn = document.getElementById('extreme-toggle');
    const room = document.getElementById('main-room');
    const txt = document.getElementById('mode-text');
    
    if(extremeMode) {
        btn.innerText = "Disable extreme mode";
        btn.style.background = "#2ecc71";
        room.classList.add('extreme-active');
        txt.innerText = "🔥 EXTREME MODE 🔥";
    } else {
        btn.innerText = "Enable extreme mode";
        btn.style.background = "#e74c3c";
        room.classList.remove('extreme-active');
        txt.innerText = "NORMAL MODE";
    }
}

function updateUI() {
    document.getElementById('coins').innerText = Math.floor(coins);
    document.getElementById('lvl').innerText = level;
    document.getElementById('streak').innerText = streak;
    document.getElementById('sizeCost').innerText = upgradeCost;
}

function buyUpgrade() {
    if (coins >= upgradeCost) {
        coins -= upgradeCost;
        poopSize += 12;
        upgradeCost = Math.floor(upgradeCost * 2.2);
        updateUI();
    }
}

function buyFriend() {
    if (coins >= friendCost) {
        coins -= friendCost;
        hasFriend = true;
        document.getElementById('buyFriend').disabled = true;
        document.getElementById('speed-card').style.display = "inline-block";
        document.getElementById('friend-area').style.opacity = "1";
        document.getElementById('friend-status').innerText = "PAL IS POOPING";
        document.getElementById('friend-emoji').innerText = "👦";
        document.getElementById('friend-poop').style.display = "block";
        startFriendTimer();
        updateUI();
    }
}

function startFriendTimer() {
    if (friendInterval) clearInterval(friendInterval);
    const income = (1000 / friendCooldown).toFixed(1);
    document.getElementById('friend-income').innerText = `+${income} COINS / SEC`;
    document.getElementById('friend-poop').style.animationDuration = (friendCooldown/1000) + "s";
    friendInterval = setInterval(() => { coins += 1; updateUI(); }, friendCooldown);
}

function upgradeFriendSpeed() {
    if (coins >= friendSpeedCost) {
        coins -= friendSpeedCost;
        friendCooldown = Math.max(150, friendCooldown - 350);
        friendSpeedCost = Math.floor(friendSpeedCost * 2.5);
        document.getElementById('speedCost').innerText = friendSpeedCost;
        startFriendTimer();
        updateUI();
    }
}

function resetRound() {
    gameState = "aiming";
    plopY = 80; fallSpeed = 0;
    babySpeed = 2 + (level * 0.25);
    toiletSpeed = 1 + (level * 0.4);
}

function update() {
    // Move Baby
    if (gameState === "aiming") {
        babyX += babyDir * babySpeed;
        if (babyX > canvas.width - 50 || babyX < 50) babyDir *= -1;
    }

    // Move Toilet (Extreme Mode)
    if (extremeMode) {
        toiletX += toiletDir * toiletSpeed;
        if (toiletX > canvas.width - 100 || toiletX < 20) toiletDir *= -1;
    }

    // Physics
    if (gameState === "falling") {
        fallSpeed += gravity;
        plopY += fallSpeed;

        if (plopY > canvas.height - 20) { 
            streak = 0; 
            resetRound(); 
            updateUI();
        }

        // Hit Detection
        if (plopY >= 380 && plopX + (poopSize/2) > toiletX && plopX - (poopSize/2) < toiletX + 80) {
            let bonus = extremeMode ? 2 : 1;
            coins += (1 + streak) * bonus;
            level += bonus;
            streak++;
            resetRound();
            updateUI();
        }
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Floor
    ctx.fillStyle = "#795548";
    ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
    // Toilet
    ctx.font = "80px Arial";
    ctx.fillText("🚽", toiletX, 420);
    // Baby
    ctx.font = "50px Arial";
    ctx.fillText("👶", babyX - 25, 70);
    // Poop
    if (gameState === "falling") {
        ctx.font = `${poopSize}px Arial`;
        ctx.fillText("💩", plopX - (poopSize/2), plopY);
    }
}

canvas.addEventListener('mousedown', () => {
    if (gameState === "aiming") {
        gameState = "falling";
        plopX = babyX;
    }
});

update();
</script>
</body>
</html>
